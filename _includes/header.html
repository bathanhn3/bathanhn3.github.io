<header class="site-header">
  <div class="container header-shell">
    <div class="brand-row">
      <a class="logo" href="{{ '/' | relative_url }}">Thành Labs</a>
      <button class="theme-toggle" type="button" data-theme-toggle aria-label="Toggle dark mode">Dark mode</button>
    </div>

    <nav class="primary-nav" aria-label="Main navigation">
      <a href="{{ '/learn/' | relative_url }}" {% if page.url contains '/learn/' %}aria-current="page"{% endif %}>Learn</a>
      <a href="{{ '/build/' | relative_url }}" {% if page.url contains '/build/' %}aria-current="page"{% endif %}>Build</a>
      <a href="{{ '/explain/' | relative_url }}" {% if page.url contains '/explain/' %}aria-current="page"{% endif %}>Explain</a>
      <a href="{{ '/breakdown/' | relative_url }}" {% if page.url contains '/breakdown/' %}aria-current="page"{% endif %}>Breakdown</a>
      <a href="{{ '/vibes/' | relative_url }}" {% if page.url contains '/vibes/' %}aria-current="page"{% endif %}>Vibes</a>
    </nav>

    <div class="header-tools">
      <form class="site-search site-search--compact" data-search role="search" action="{{ '/blog/' | relative_url }}" method="get">
        <label class="visually-hidden" for="header-search">Search articles</label>
        <input id="header-search" type="search" name="q" placeholder="Search article..." autocomplete="off" data-search-input>
        <div class="search-results" data-search-results></div>
      </form>

      <nav class="secondary-nav" aria-label="Secondary navigation">
        <a href="{{ '/blog/' | relative_url }}" {% if page.url contains '/blog/' %}aria-current="page"{% endif %}>Blog</a>
        <a href="{{ '/roadmap/' | relative_url }}" {% if page.url contains '/roadmap/' %}aria-current="page"{% endif %}>Roadmap</a>
        <a href="{{ '/tags/' | relative_url }}" {% if page.url contains '/tags/' %}aria-current="page"{% endif %}>Tags</a>
        <a href="{{ '/about/' | relative_url }}" {% if page.url contains '/about/' %}aria-current="page"{% endif %}>About</a>
      </nav>
    </div>
  </div>
</header>
