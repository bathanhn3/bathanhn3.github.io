title: Thành Labs
description: Thành Labs la blog ca nhan ve cong nghe, noi Thành học, build va giai thich moi thu theo cach de hieu nhat.
url: "https://bathanhn3.github.io"
baseurl: ""
lang: vi
timezone: Asia/Bangkok
author: Thanh

markdown: kramdown
highlighter: rouge
permalink: /:slug/

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - .continue
  - vendor
  - node_modules
  - Gemfile
  - Gemfile.lock
  - push.sh

subscribe_url: "https://buttondown.email/api/emails/embed-subscribe/thanh-labs"
giscus_repo: ""
giscus_repo_id: ""
giscus_category: ""
giscus_category_id: ""

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
      author: Thanh
  - scope:
      path: ""
      type: "pages"
    values:
      layout: default

