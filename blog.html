<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Financial Blog Post">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Blog Post</title>
    <link rel="stylesheet" href="css/blog.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <h1><a href="index.html">Financial Insights Blog</a></h1>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="blog.html">Blog</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Blog Post Content -->
    <section class="blog-post">
        <div class="container">
            <article id="post-content">
                <!-- Nội dung bài blog sẽ được tải vào đây -->
            </article>
        </div>
    </section>

    <footer>
        <p>&copy; 2024 Financial Insights. All rights reserved.</p>
    </footer>

    <script>
        const params = new URLSearchParams(window.location.search);
        const post = params.get('post');
        const postPath = `blog/${post}.md`;

        fetch(postPath)
            .then(response => response.text())
            .then(markdown => {
                document.getElementById('post-content').innerHTML = marked(markdown);
            })
            .catch(error => {
                document.getElementById('post-content').innerHTML = '<p>Post not found.</p>';
            });
    </script>
</body>
</html>
